version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: nanocore-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: nanocore123
      MYSQL_DATABASE: nanocore
    ports:
      - "3307:3306"
    volumes:
      - nanocore_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pnanocore123"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nanocore-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  nanocore_mysql_data:
