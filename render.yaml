services:
  # Backend API
  - type: web
    name: nanocore-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: export NPM_CONFIG_PRODUCTION=false && npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nanocore-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000

  # Frontend Web
  - type: web
    name: nanocore-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: nanocore-backend
          property: host

databases:
  - name: nanocore-db
    plan: free
